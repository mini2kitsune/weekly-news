<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotebookLM 貼付支援 — KOKONI週次ニュース</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    line-height: 1.6;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 8px;
    color: #4a9eff;
  }
  .meta { color: #999; font-size: 13px; margin-bottom: 24px; }
  .meta strong { color: #e8e8e8; }
  .steps {
    background: #1a1a1a;
    border-left: 3px solid #4a9eff;
    padding: 12px 16px;
    margin-bottom: 24px;
    border-radius: 4px;
    font-size: 14px;
  }
  .steps ol { padding-left: 20px; }
  .steps li { margin: 4px 0; }
  .section {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .section h2 {
    font-size: 17px;
    margin-bottom: 12px;
    color: #4a9eff;
  }
  .copy-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: #4a9eff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:active { background: #2a6fcc; }
  .copy-btn.done { background: #4caf50; }
  .preview {
    margin-top: 12px;
    max-height: 180px;
    overflow-y: auto;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    color: #aaa;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .preview.empty { color: #555; font-style: italic; }
  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: #666;
  }
  .footer a { color: #4a9eff; text-decoration: none; }
  .err { color: #ef5350; }
</style>
</head>
<body>

<h1>NotebookLM 貼付支援</h1>
<div class="meta" id="meta">読み込み中...</div>

<div class="steps">
  <strong>使い方:</strong>
  <ol>
    <li>下の「プロンプトをコピー」を押す → NotebookLM の音声概要「カスタマイズ」に貼り付け</li>
    <li>下の「本文をコピー」を押す → NotebookLM のソース欄に貼り付け</li>
    <li>NotebookLM で「生成」</li>
  </ol>
</div>

<div class="section">
  <h2>① プロンプト</h2>
  <button class="copy-btn" id="btn-prompt" onclick="doCopy('prompt')">📋 プロンプトをコピー</button>
  <div class="preview empty" id="prev-prompt">（読み込み中）</div>
</div>

<div class="section">
  <h2>② 本文（最新号）</h2>
  <button class="copy-btn" id="btn-content" onclick="doCopy('content')">📋 本文をコピー</button>
  <div class="preview empty" id="prev-content">（読み込み中）</div>
</div>

<div class="footer">
  <a href="./">← KOKONIニュースに戻る</a>
</div>

<script>
const state = { prompt: '', content: '' };

function bust() { return '?t=' + Date.now(); }

async function loadPrompt() {
  try {
    const res = await fetch('prompt.txt' + bust());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.prompt = await res.text();
    const prev = document.getElementById('prev-prompt');
    prev.classList.remove('empty');
    prev.textContent = state.prompt;
  } catch (e) {
    document.getElementById('prev-prompt').innerHTML = '<span class="err">プロンプト読み込み失敗: ' + e.message + '</span>';
  }
}

async function loadLatest() {
  try {
    const idx = await fetch('news/index.json' + bust()).then(r => r.json());
    idx.sort((a, b) => b.date.localeCompare(a.date));
    const latest = idx[0];
    const md = await fetch('news/' + latest.file + bust()).then(r => r.text());
    state.content = md;

    const d = new Date(latest.date + 'T00:00:00');
    const ds = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    document.getElementById('meta').innerHTML =
      `最新号: <strong>${latest.title}</strong>（${ds}）`;

    const prev = document.getElementById('prev-content');
    prev.classList.remove('empty');
    prev.textContent = md.slice(0, 800) + (md.length > 800 ? '\n\n…（以下省略・コピーには全文含む）' : '');
  } catch (e) {
    document.getElementById('meta').innerHTML = '<span class="err">本文読み込み失敗: ' + e.message + '</span>';
    document.getElementById('prev-content').innerHTML = '<span class="err">読み込みに失敗しました</span>';
  }
}

async function doCopy(key) {
  const text = state[key];
  if (!text) { alert('まだ読み込めておりませぬ。少し待ってからお試しを。'); return; }
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('btn-' + key);
    const label = key === 'prompt' ? 'プロンプト' : '本文';
    btn.textContent = '✓ ' + label + 'をコピーしました';
    btn.classList.add('done');
    setTimeout(() => {
      btn.textContent = '📋 ' + label + 'をコピー';
      btn.classList.remove('done');
    }, 2500);
  } catch (e) {
    alert('コピー失敗: ' + e.message + '\n手動で選択してコピーしてくだされ。');
  }
}

loadPrompt();
loadLatest();
</script>

</body>
</html>
